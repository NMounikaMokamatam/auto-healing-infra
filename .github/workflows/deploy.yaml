name: Deploy — Terraform Plan + Apply

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6"

    - name: Terraform Init
      run: terraform init -backend=false
      working-directory: terraform

    - name: Terraform Validate
      run: terraform validate
      working-directory: terraform

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      working-directory: terraform
      continue-on-error: true

  lint-lambda:
    name: Lint Python Lambda
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linter
      run: pip install flake8

    - name: Lint handler.py
      run: flake8 lambda/src/handler.py --max-line-length=120 --ignore=E501
      continue-on-error: true

  deploy:
    name: Deploy (requires AWS secrets)
    runs-on: ubuntu-latest
    needs: [validate, lint-lambda]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: AWS secrets required
      run: |
        echo "=================================================="
        echo "  To enable Terraform apply, add these secrets:"
        echo "  AWS_ACCESS_KEY_ID"
        echo "  AWS_SECRET_ACCESS_KEY"
        echo "  AWS_REGION"
        echo "  SLACK_WEBHOOK_URL"
        echo "=================================================="
